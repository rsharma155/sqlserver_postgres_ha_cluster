  haproxy:
    image: haproxy:latest
    container_name: haproxy
    restart: always
    ports:
      - "5000:5000"
      - "5001:5001"
      - "7000:7000"
    mem_limit: 128m
    mem_reservation: 64m
    cpus: '0.25'
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - patroni1
      - patroni2
      - patroni3
    networks:
      - pg_network

  pg_backup:
    image: postgres:17-alpine
    container_name: pg_backup
    restart: always
    environment:
      PGPASSWORD: postgres123
      PGHOST: haproxy
      PGPORT: 5000
      PGUSER: postgres
      BACKUP_DIR: /backups
      WAL_DIR: /wal_archive
      RETENTION_DAYS: 7
    mem_limit: 512m
    mem_reservation: 256m
    cpus: '0.5'
    volumes:
      - pg_backup_data:/backups
      - ./docker/backup.sh:/backup.sh
      - wal_archive:/wal_archive:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache postgresql17-client 2>/dev/null
        chmod +x /backup.sh

        # ── Production backup schedule ──────────────────────────
        # Daily full logical backup at 1:00 AM
        echo "0 1 * * * /backup.sh full >> /backups/backup.log 2>&1" > /etc/crontabs/root
        # WAL archive tarball every 6 hours (2am, 8am, 2pm, 8pm)
        echo "0 */6 * * * /backup.sh wal >> /backups/backup.log 2>&1" >> /etc/crabs/root
        # Cleanup expired backups and stale WAL files at 4:00 AM daily
        echo "0 4 * * * /backup.sh cleanup >> /backups/backup.log 2>&1" >> /etc/crontabs/root
        # Health check: verify pg_isready every 15 minutes, log failures
        echo "*/15 * * * * pg_isready -h haproxy -p 5000 -U postgres -t 5 >> /backups/health.log 2>&1 || echo \"[\$(date '+%Y-%m-%d %H:%M:%S')] UNREACHABLE\" >> /backups/health.log" >> /etc/crontabs/root

        # Run initial full backup on first start
        echo "[$(date '+%Y-%m-%d %H:%M:%S')] Container started. Running initial backup..." | tee -a /backups/backup.log
        /backup.sh full >> /backups/backup.log 2>&1
        echo "[$(date '+%Y-%m-%d %H:%M:%S')] Initial backup complete. crond is now managing the schedule." | tee -a /backups/backup.log

        crond -f
    depends_on: [haproxy]
    networks:
      - pg_network

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: seaweedfs
    restart: always
    ports:
      - "8333:8333"
    command: "server -s3"
    mem_limit: 512m
    mem_reservation: 256m
    cpus: '0.5'
    volumes:
      - seaweedfs_data:/data
    networks:
      - pg_network

volumes:
  etcd_data:
  patroni1_data:
  patroni2_data:
  patroni3_data:
  wal_archive:
  pg_log:
  pg_backup_data:
  seaweedfs_data:

networks:
  pg_network:
    driver: bridge
