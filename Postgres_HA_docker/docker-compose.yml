services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.15
    container_name: etcd
    restart: always
    environment:
      - ETCD_ENABLE_V2=true
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_DATA_DIR=/etcd-data
    ports:
      - "2385:2379"
    mem_limit: 256m
    mem_reservation: 128m
    cpus: '0.5'
    volumes:
      - etcd_data:/etcd-data
    networks:
      - pg_network

  patroni1:
    build:
      context: ./docker
      dockerfile: Dockerfile
    image: custom-patroni:latest
    container_name: patroni1
    restart: always
    ports:
      - "5043:5432"
      - "8043:8008"
    environment:
      PATRONI_CONFIGURATION: |
        scope: pgcluster
        name: patroni1
        log:
          level: WARNING
        etcd:
          url: http://etcd:2379
        restapi:
          listen: 0.0.0.0:8008
          connect_address: patroni1:8008
        postgresql:
          listen: 0.0.0.0:5432
          connect_address: patroni1:5432
          data_dir: /data/postgresql
          authentication:
            superuser:
              username: postgres
              password: postgres123
            replication:
              username: repl_user
              password: repl_pass
          parameters:
            max_connections: 200
            shared_preload_libraries: pg_stat_statements
            wal_level: replica
            archive_mode: "on"
            archive_command: "test ! -f /wal_archive/%f && cp %p /wal_archive/%f"
            archive_timeout: 60
            wal_log_hints: "on"
            wal_compression: zstd
            wal_keep_size: 512
            max_wal_senders: 10
            logging_collector: "on"
            log_directory: /var/log/postgresql
            log_filename: postgresql-%Y-%m-%d_%H%M%S.log
            log_rotation_age: 1440
            log_rotation_size: 102400
            log_statement: ddl
            log_min_duration_statement: 1000
            pg_stat_statements.max: 10000
            pg_stat_statements.track: all
        bootstrap:
          dcs:
            ttl: 30
            loop_wait: 10
            retry_timeout: 10
            maximum_lag_on_failover: 1048576
            postgresql:
              use_pg_rewind: true
              use_slots: true
              parameters:
                max_connections: 200
                shared_preload_libraries: pg_stat_statements
                wal_level: replica
                archive_mode: "on"
                archive_command: "test ! -f /wal_archive/%f && cp %p /wal_archive/%f"
                archive_timeout: 60
                wal_log_hints: "on"
                wal_compression: zstd
                wal_keep_size: 512
                max_wal_senders: 10
          initdb:
            - encoding: UTF8
            - data-checksums
          pg_hba:
            - host replication repl_user 0.0.0.0/0 md5
            - host all all 0.0.0.0/0 md5
    mem_limit: 1g
    mem_reservation: 512m
    cpus: '0.75'
    volumes:
      - patroni1_data:/data/postgresql
      - wal_archive:/wal_archive
      - pg_log:/var/log/postgresql
    depends_on: [etcd]
    networks:
      - pg_network

